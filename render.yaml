services:
  - type: web
    name: newsletter-system
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 3000
      # SMTP fields are optional — leave empty for demo mode (Ethereal)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM_NAME
        value: Newsletter System
      - key: MAIL_FROM_ADDRESS
        sync: false
